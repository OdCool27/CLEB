# Apache Log4j2 Configuration for CLEB (Campus Lab Equipment Booking System)
# This file configures logging for all major components of the application

# Global Status of the logging system (valid values: TRACE, DEBUG, INFO, WARN, ERROR, FATAL)
status = info

# Name of the configuration
name = CLEBLoggingConfig

# Appender Configuration
# Console Appender - logs to console with color support
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.console.target = SYSTEM_OUT

# Rolling File Appender - General application logs
appender.rolling.type = RollingFile
appender.rolling.name = RollingFileAppender
appender.rolling.fileName = logs/cleb-application.log
appender.rolling.filePattern = logs/cleb-application-%d{yyyy-MM-dd}-%i.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 10MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 30

# Rolling File Appender - Server & Networking logs
appender.server.type = RollingFile
appender.server.name = ServerFileAppender
appender.server.fileName = logs/server-networking.log
appender.server.filePattern = logs/server-networking-%d{yyyy-MM-dd}-%i.log.gz
appender.server.layout.type = PatternLayout
appender.server.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.server.policies.type = Policies
appender.server.policies.time.type = TimeBasedTriggeringPolicy
appender.server.policies.time.interval = 1
appender.server.policies.time.modulate = true
appender.server.policies.size.type = SizeBasedTriggeringPolicy
appender.server.policies.size.size = 10MB
appender.server.strategy.type = DefaultRolloverStrategy
appender.server.strategy.max = 20

# Rolling File Appender - Authentication & Security logs
appender.auth.type = RollingFile
appender.auth.name = AuthFileAppender
appender.auth.fileName = logs/authentication-security.log
appender.auth.filePattern = logs/authentication-security-%d{yyyy-MM-dd}-%i.log.gz
appender.auth.layout.type = PatternLayout
appender.auth.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.auth.policies.type = Policies
appender.auth.policies.time.type = TimeBasedTriggeringPolicy
appender.auth.policies.time.interval = 1
appender.auth.policies.time.modulate = true
appender.auth.policies.size.type = SizeBasedTriggeringPolicy
appender.auth.policies.size.size = 10MB
appender.auth.strategy.type = DefaultRolloverStrategy
appender.auth.strategy.max = 20

# Rolling File Appender - Database operations logs
appender.database.type = RollingFile
appender.database.name = DatabaseFileAppender
appender.database.fileName = logs/database-operations.log
appender.database.filePattern = logs/database-operations-%d{yyyy-MM-dd}-%i.log.gz
appender.database.layout.type = PatternLayout
appender.database.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.database.policies.type = Policies
appender.database.policies.time.type = TimeBasedTriggeringPolicy
appender.database.policies.time.interval = 1
appender.database.policies.time.modulate = true
appender.database.policies.size.type = SizeBasedTriggeringPolicy
appender.database.policies.size.size = 10MB
appender.database.strategy.type = DefaultRolloverStrategy
appender.database.strategy.max = 20

# Rolling File Appender - Service layer logs
appender.service.type = RollingFile
appender.service.name = ServiceFileAppender
appender.service.fileName = logs/service-layer.log
appender.service.filePattern = logs/service-layer-%d{yyyy-MM-dd}-%i.log.gz
appender.service.layout.type = PatternLayout
appender.service.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.service.policies.type = Policies
appender.service.policies.time.type = TimeBasedTriggeringPolicy
appender.service.policies.time.interval = 1
appender.service.policies.time.modulate = true
appender.service.policies.size.type = SizeBasedTriggeringPolicy
appender.service.policies.size.size = 10MB
appender.service.strategy.type = DefaultRolloverStrategy
appender.service.strategy.max = 20

# Rolling File Appender - Error and Exception logs
appender.error.type = RollingFile
appender.error.name = ErrorFileAppender
appender.error.fileName = logs/errors-exceptions.log
appender.error.filePattern = logs/errors-exceptions-%d{yyyy-MM-dd}-%i.log.gz
appender.error.layout.type = PatternLayout
appender.error.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n%xEx%n
appender.error.policies.type = Policies
appender.error.policies.time.type = TimeBasedTriggeringPolicy
appender.error.policies.time.interval = 1
appender.error.policies.time.modulate = true
appender.error.policies.size.type = SizeBasedTriggeringPolicy
appender.error.policies.size.size = 10MB
appender.error.strategy.type = DefaultRolloverStrategy
appender.error.strategy.max = 30
appender.error.filter.type = ThresholdFilter
appender.error.filter.level = WARN
appender.error.filter.onMatch = ACCEPT
appender.error.filter.onMismatch = DENY

# Rolling File Appender - Request and Dispatcher logs
appender.request.type = RollingFile
appender.request.name = RequestFileAppender
appender.request.fileName = logs/request-dispatcher.log
appender.request.filePattern = logs/request-dispatcher-%d{yyyy-MM-dd}-%i.log.gz
appender.request.layout.type = PatternLayout
appender.request.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%t] %logger{36} - %msg%n
appender.request.policies.type = Policies
appender.request.policies.time.type = TimeBasedTriggeringPolicy
appender.request.policies.time.interval = 1
appender.request.policies.time.modulate = true
appender.request.policies.size.type = SizeBasedTriggeringPolicy
appender.request.policies.size.size = 10MB
appender.request.strategy.type = DefaultRolloverStrategy
appender.request.strategy.max = 20

# Logger Configuration

# Server and Networking loggers
logger.server.name = server.networking.Server
logger.server.level = info
logger.server.additivity = false
logger.server.appenderRef.server.ref = ServerFileAppender
logger.server.appenderRef.console.ref = ConsoleAppender

logger.clienthandler.name = server.networking.ClientHandler
logger.clienthandler.level = debug
logger.clienthandler.additivity = false
logger.clienthandler.appenderRef.server.ref = ServerFileAppender
logger.clienthandler.appenderRef.console.ref = ConsoleAppender

# Authentication and Security loggers
logger.loginhandler.name = server.handlers.user.LoginHandler
logger.loginhandler.level = info
logger.loginhandler.additivity = false
logger.loginhandler.appenderRef.auth.ref = AuthFileAppender
logger.loginhandler.appenderRef.console.ref = ConsoleAppender

logger.userhandler.name = server.handlers.user.UserHandler
logger.userhandler.level = debug
logger.userhandler.additivity = false
logger.userhandler.appenderRef.auth.ref = AuthFileAppender
logger.userhandler.appenderRef.console.ref = ConsoleAppender

# DAO loggers
logger.dao.name = server.dao
logger.dao.level = debug
logger.dao.additivity = false
logger.dao.appenderRef.database.ref = DatabaseFileAppender
logger.dao.appenderRef.console.ref = ConsoleAppender

# Service Layer loggers
logger.service.name = server.service
logger.service.level = info
logger.service.additivity = false
logger.service.appenderRef.service.ref = ServiceFileAppender
logger.service.appenderRef.console.ref = ConsoleAppender

# Handler loggers
logger.handlers.name = server.handlers
logger.handlers.level = info
logger.handlers.additivity = false
logger.handlers.appenderRef.service.ref = ServiceFileAppender
logger.handlers.appenderRef.console.ref = ConsoleAppender

# Request Dispatcher and Handler loggers
logger.dispatcher.name = server.dispatcher.RequestDispatcher
logger.dispatcher.level = debug
logger.dispatcher.additivity = false
logger.dispatcher.appenderRef.request.ref = RequestFileAppender
logger.dispatcher.appenderRef.console.ref = ConsoleAppender

logger.handler.name = server.dispatcher.RequestHandler
logger.handler.level = debug
logger.handler.additivity = false
logger.handler.appenderRef.request.ref = RequestFileAppender
logger.handler.appenderRef.console.ref = ConsoleAppender

# Client-side loggers
logger.clientcontroller.name = client.controller.ClientController
logger.clientcontroller.level = info
logger.clientcontroller.additivity = false
logger.clientcontroller.appenderRef.rolling.ref = RollingFileAppender
logger.clientcontroller.appenderRef.console.ref = ConsoleAppender

logger.clientmain.name = client.cli.Main
logger.clientmain.level = info
logger.clientmain.additivity = false
logger.clientmain.appenderRef.rolling.ref = RollingFileAppender
logger.clientmain.appenderRef.console.ref = ConsoleAppender

# DTO validation and envelope loggers
logger.dto.name = server.dto
logger.dto.level = debug
logger.dto.additivity = false
logger.dto.appenderRef.request.ref = RequestFileAppender

logger.envelopes.name = server.envelopes
logger.envelopes.level = debug
logger.envelopes.additivity = false
logger.envelopes.appenderRef.request.ref = RequestFileAppender

# Input Validation logger
logger.validator.name = server.util.InputValidator
logger.validator.level = info
logger.validator.additivity = false
logger.validator.appenderRef.auth.ref = AuthFileAppender

# Utility Loggers
# Logging Utility - handles centralized logging across the application
logger.loggingutil.name = server.util.LoggingUtil
logger.loggingutil.level = debug
logger.loggingutil.additivity = false
logger.loggingutil.appenderRef.rolling.ref = RollingFileAppender
logger.loggingutil.appenderRef.console.ref = ConsoleAppender

# Password Hashing Utility - handles secure password hashing and verification
logger.passwordutil.name = server.util.PasswordHashingUtil
logger.passwordutil.level = debug
logger.passwordutil.additivity = false
logger.passwordutil.appenderRef.auth.ref = AuthFileAppender
logger.passwordutil.appenderRef.console.ref = ConsoleAppender

# SMTP Utility - handles email notifications
logger.smtputil.name = server.util.SMTPUtil
logger.smtputil.level = debug
logger.smtputil.additivity = false
logger.smtputil.appenderRef.service.ref = ServiceFileAppender
logger.smtputil.appenderRef.console.ref = ConsoleAppender

# Root Logger Configuration (catches everything not matched by specific loggers)
rootLogger.level = info
rootLogger.appenderRef.rolling.ref = RollingFileAppender
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.error.ref = ErrorFileAppender
